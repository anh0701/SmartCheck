<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Smart Check</title>
    <link rel="stylesheet" href="monitor.css">
</head>
<body>

<div class="container">
    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Smart Check</h2>
        <button>Dashboard</button>
        <button>Training</button>
        <button class="active">Monitor Run</button>
        <button>Report</button>
    </div>

    <!-- Main -->
    <div class="main">
        <div id="monitor-box" class="monitor green">
            <div class="inner-box">
                WO: GA &nbsp;&nbsp; Line: 08LH &nbsp;&nbsp; Part: TE002 &nbsp;&nbsp; SN: 3925765
                <span class="info">i</span>
            </div>
        </div>

        <!-- Buttons -->
        <div class="actions">
            <button class="yellow">Defect</button>
            <button class="orange">Buyoff</button>
            <button class="yellow">Rework</button>
            <button class="gray">Scrap</button>
            <button class="yellow">Andon</button>
            <button class="green-btn">Release</button>
            <button class="blue">Approve</button>

            <button class="blue">In</button>
            <button class="blue">Out</button>
            <button class="green-btn">Start</button>
            <button class="red">Stop</button>
            <button class="yellow">Hold</button>
            <button class="orange">Lock</button>
            <button class="cyan">Confirm</button>
        </div>
    </div>
</div>

<script>
    const box = document.getElementById("monitor-box");

    const colors = ["green", "yellow", "red"];
    let index = 0;

    box.addEventListener("click", () => {
        box.classList.remove(colors[index]);
        index = (index + 1) % colors.length;
        box.classList.add(colors[index]);
    });
</script>

</body>
</html>
