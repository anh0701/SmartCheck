<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Evaluation</title>
    <link rel="stylesheet" href="evaluation.css">
      <script src="../js/components.js"></script>
</head>
<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Smart Check</h2>
        <button>Dashboard</button>
        <button class="active">Training</button>
        <button>Monitor Run</button>
        <button>Report</button>
    </div>

    <!-- Main -->
    <div class="main">

        <!-- Top form -->
        <div class="top-form">
            <div class="form-row">
                <label>Model</label>
                <input type="text">
            </div>

            <div class="form-row">
                <label>Features</label>
                <input type="text">
            </div>
        </div>

        <!-- Hyperparameters + Result -->
        <div class="box">
            <div class="left">
                <h3>Hyperparameters</h3>
                <p>Epoch:</p>
                <p>Learning rate:</p>
                <p>Batch size:</p>
            </div>

            <div class="right">
                <h3>Result</h3>
                <p>Accuracy:</p>
                <p>Time:</p>
            </div>
        </div>

        <!-- Logs -->
        <div class="logs">
            Logs: Model missing ...
        </div>

        <!-- Bottom buttons -->
        <div class="actions">
            <button class="compare">Compare</button>
            <button class="export">Export</button>
            <button class="save">Save</button>
        </div>

    </div>
</div>

</body>
</html>
