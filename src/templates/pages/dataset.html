<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Training Upload</title>
    <link rel="stylesheet" href="dataset.css">
      <script src="../js/components.js"></script>
</head>
<body>

<div class="container">

    <app-menu></app-menu>

    <!-- Main -->
    <div class="main">

        <!-- Upload Button -->
        <button class="upload-btn">Upload</button>

        <!-- Dataset Box -->
        <div class="dataset-box">
            <div class="row">
                <label>Dataset</label>
            </div>

            <div class="row">
                <label>Rows</label>
                <input type="text" class="input-box">
            </div>

            <!-- Feature / Target -->
            <div class="feature-target">
                <div class="feature">Features</div>
                <div class="divider"></div>
                <div class="target">Target</div>
            </div>

            <!-- Logs -->
            <div class="logs">
                Logs: Missing data ....
            </div>
        </div>

        <!-- Bottom Buttons -->
        <div class="bottom-actions">
            <button class="preview">Preview</button>
            <button class="select">Select</button>
            <button class="next">Next</button>
        </div>

    </div>
</div>

</body>
</html>
