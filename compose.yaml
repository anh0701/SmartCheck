version: "3.9"

services:
  postgres:
    image: docker.io/library/postgres:16
    container_name: smart-check-db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - smart-check-vol:/var/lib/postgresql/data

  flask-api:
    build: .
    container_name: smart-check-api
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - postgres
    volumes:
      - ./src:/app

volumes:
  smart-check-vol: